<!-- Password protection check - always active -->
<script>
  // Inline version - runs immediately before page renders
  (function() {
    const AUTH_KEY = 'preview_authenticated';
    const INTENDED_PAGE_KEY = 'intended_page';
    const GATE_PAGE = '{{ site.baseurl }}/preview-gate.html';

    const PUBLIC_PAGES = [
      '/preview-gate.html',
      '/preview-gate'
    ];

    function isPublicPage() {
      const currentPath = window.location.pathname;
      return PUBLIC_PAGES.some(function(page) {
        return currentPath.endsWith(page);
      });
    }

    // Check localStorage for persistent authentication
    if (!isPublicPage() && localStorage.getItem(AUTH_KEY) !== 'true') {
      sessionStorage.setItem(INTENDED_PAGE_KEY, window.location.href);
      window.location.href = GATE_PAGE;
    }
  })();
</script>
