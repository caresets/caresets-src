title: BeSafeShare
email: your-email@example.com
description: >-
  Write an awesome description for your new site here.

domain: caresets.github.io
url: https://caresets.github.io
baseurl: /caresets

# Build settings
theme: just-the-docs
remote_theme: pmarsceill/just-the-docs
plugins:
  - jekyll-default-layout
  - jekyll-spaceship  

color_scheme: wider

search_enabled: true

logo: "/assets/images/besafeshare.png"

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - old_docs
  - node_modules/
  - README.md
  - vendor/bundle/
  - vendor/
  - vendor/cache/

footer_content: "Copyright &copy; 2025 Your Organization"

aux_links_new_tab: true
heading_anchors: true

gh_edit_link: false
gh_edit_link_text: "Edit this page on GitHub."
gh_edit_repository: "https://github.com/caresets/glossary"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

include: 
  - "_resources"

# Clean URLs based on file path
permalink: pretty

# # Collections for each language
# collections:
#   en:
#     output: true
#     permalink: /en/:path/
#   fr:
#     output: true
#     permalink: /fr/:path/
#   nl:
#     output: true
#     permalink: /nl/:path/

# Auto-set lang for each collection
defaults:
  - scope:
      path: "en"
    values:
      lang: en
      
  - scope:
      path: "fr"
    values:
      lang: fr
      
  - scope:
      path: "nl"
    values:
      lang: nl

# Language configuration
languages:
  - code: en
    name: English
    flag: 🇬🇧
  - code: fr
    name: Français
    flag: FR
  - code: nl
    name: Nederlands
    flag: NL