name: Build, Publish & Package

# Runs the generation scripts, builds the site, publishes to the gh-pages
# branch, and produces a downloadable .zip for the RIZIV-INAMI website.

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "backups/**"   # the auto-backup commit must not re-trigger this workflow
  workflow_dispatch:
    inputs:
      gh_pages_baseurl:
        description: "Baseurl for the gh-pages build (must match the repo name for a project page)"
        required: false
        default: "/caresets-src"
      riziv_baseurl:
        description: "Baseurl for the RIZIV-INAMI zip (empty = domain root, or e.g. /besafeshare)"
        required: false
        default: ""

permissions:
  contents: write        # needed to push to the gh-pages branch

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      # Resolution order: manual "Run workflow" input -> repo variable -> literal default.
      # Configure persistently in Settings > Secrets and variables > Actions > Variables.
      GH_PAGES_BASEURL: ${{ github.event.inputs.gh_pages_baseurl || vars.GH_PAGES_BASEURL || '/caresets-src' }}
      RIZIV_BASEURL: ${{ github.event.inputs.riziv_baseurl || vars.RIZIV_BASEURL || '' }}
      JEKYLL_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- 1. Did this change touch the content source (input/ or VERSION)? ----
      # If yes  -> regenerate _resources/, snapshot a backup, commit both (Python).
      # If no   -> skip Python entirely and just build & deploy what's committed.
      - name: Detect content changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            content:
              - 'input/**'
              - 'VERSION'

      - name: Set up Python
        if: steps.filter.outputs.content == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate content + snapshot backup (content changed only)
        if: (steps.filter.outputs.content == 'true' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          python build_content.py      # input/ -> _resources/ (models, glossary, mappings)
          python backup_content.py     # snapshot input/ -> backups/v<VERSION>/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _resources backups
          if git diff --cached --quiet; then
            echo "Content already up to date; nothing to commit."
          else
            git commit -m "chore: regenerate content + snapshot input v$(cat VERSION) [skip ci]"
            git push
          fi

      # ---- 2. Build the site (always — from the committed/regenerated _resources) ----
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site for GitHub Pages
        run: bundle exec jekyll build --baseurl "$GH_PAGES_BASEURL" --destination _site_ghpages

      - name: Build site for RIZIV-INAMI
        run: bundle exec jekyll build --baseurl "$RIZIV_BASEURL" --destination _site_riziv

      # ---- 3. Package the RIZIV-INAMI deployable as a .zip ----
      - name: Create RIZIV-INAMI zip
        run: (cd _site_riziv && zip -r -q ../riziv-inami-site.zip .)

      # Include the zip in the published site so it gets a stable, public URL
      # (e.g. https://caresets.github.io/glossary/riziv-inami-site.zip)
      - name: Add zip to the gh-pages payload
        run: cp riziv-inami-site.zip _site_ghpages/

      # ---- 4. Publish to the gh-pages branch (only from main) ----
      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site_ghpages
          publish_branch: gh-pages

      # Also keep it as a workflow artifact (useful on non-main / manual runs)
      - name: Upload RIZIV-INAMI zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: riziv-inami-site
          path: riziv-inami-site.zip
          retention-days: 90
