<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview Access</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 100%;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
      text-align: center;
    }
    
    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
      font-size: 14px;
    }
    
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .error {
      color: #e74c3c;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }
    
    .error.show {
      display: block;
    }
    
    .info {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
      color: #999;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔒 Preview Access</h1>
    <p class="subtitle">Enter the password to view the preview site</p>
    
    <form id="passwordForm">
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="off" required>
      </div>
      
      <button type="submit">Access Preview</button>
      
      <div class="error" id="error">
        ❌ Incorrect password. Please try again.
      </div>
    </form>
    
    <div class="info">
      Preview site for team review only
    </div>
  </div>

  <script>
    // Configuration - CHANGE THIS PASSWORD
    const PREVIEW_PASSWORD = 'preview2024';
    const AUTH_KEY = 'preview_authenticated';
    const INTENDED_PAGE_KEY = 'intended_page';

    // Check if already authenticated (use localStorage for persistent storage)
    if (localStorage.getItem(AUTH_KEY) === 'true') {
      redirectToIntendedPage();
    }

    document.getElementById('passwordForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');

      if (password === PREVIEW_PASSWORD) {
        // Set authentication flag (persists across browser sessions)
        localStorage.setItem(AUTH_KEY, 'true');

        // Redirect to intended page
        redirectToIntendedPage();
      } else {
        // Show error
        errorDiv.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();

        // Hide error after 3 seconds
        setTimeout(function() {
          errorDiv.classList.remove('show');
        }, 3000);
      }
    });

    function redirectToIntendedPage() {
      const intendedPage = sessionStorage.getItem(INTENDED_PAGE_KEY) || '/caresets-src/';
      sessionStorage.removeItem(INTENDED_PAGE_KEY);
      window.location.href = intendedPage;
    }
  </script>
</body>
</html>
