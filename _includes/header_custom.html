{% assign current_lang = page.lang | default: site.lang | default: 'en' %}

<style>
.header-language-switcher {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 1000;
}

.lang-select {
  background: white;
  border: 2px solid #7253ed;
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 16px;
  cursor: pointer;
  font-weight: 600;
}

.lang-select:hover {
  background: #f5f6fa;
}
</style>

<div class="header-language-switcher">
  <select class="lang-select" onchange="window.location.href=this.value">
    {% for language in site.languages %}
      {% assign translated_page = page.url | replace: current_lang, language.code %}
      <option value="{{ translated_page | relative_url }}" {% if language.code == current_lang %}selected{% endif %}>
        {{ language.flag }}
      </option>
    {% endfor %}
  </select>
</div>
