<!-- Set document language -->
<script>
  // Set on html element immediately (this works in head)
  document.documentElement.lang = '{{ page.lang | default: "en" }}';
  
  // Set on body when it exists
  (function() {
    function setBodyLang() {
      if (document.body) {
        document.body.setAttribute('data-lang', '{{ page.lang | default: "en" }}');
      } else {
        // Body doesn't exist yet, try again
        setTimeout(setBodyLang, 10);
      }
    }
    setBodyLang();
  })();
</script>
